services:
  - type: web
    name: weather-app
    env: node
    region: singapore
    plan: free
    buildCommand: npm ci --only=production
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: OPENWEATHER_API_KEY
        sync: false
    disk:
      name: weather-app-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
